logFilters:
  - code: YN0060
    level: discard
  - code: YN0002
    level: discard
  - code: YN0086
    level: discard

nodeLinker: pnp
yarnPath: .yarn/releases/yarn-4.13.0.cjs

packageExtensions:
  eslint-config-next@*:
    dependencies:
      next: '*'
  next@*:
    dependencies:
      '@vanilla-extract/next-plugin': '*'
